name: SDK Tests

on:
  push:
    branches:
      - main
      - dev
      - stage
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  sdk-tests:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 90
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run unit tests
        run: yarn test:unit

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Start local Anvil + Sequencer stack
        run: docker compose -f test/ci/docker-compose.yml up -d --build

      - name: Wait for stack readiness
        run: bash test/ci/wait-for-stack.sh

      - name: Generate integration env file
        run: bash test/ci/write-test-env.sh

      - name: Run integration tests
        run: yarn test:integration

      - name: Print stack logs on failure
        if: failure()
        run: |
          docker compose -f test/ci/docker-compose.yml ps
          docker compose -f test/ci/docker-compose.yml logs --no-color --tail=400 anvil deployer sequencer

      - name: Stop local stack
        if: always()
        run: docker compose -f test/ci/docker-compose.yml down -v --remove-orphans
