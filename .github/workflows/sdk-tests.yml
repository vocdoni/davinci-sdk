name: SDK E2E Election Cycle

on:
  push:
    branches:
      - main
      - dev
      - stage
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  sdk-e2e-election-cycle:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: [self-hosted]
    timeout-minutes: 90
    env:
      COMPOSE_PROJECT_NAME: ci-${{ github.run_id }}-${{ github.run_attempt }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Enable Corepack
        run: |
          corepack enable
          corepack prepare yarn@1.22.22 --activate
          yarn --version

      - name: Select free host ports
        run: |
          node <<'NODE'
          const fs = require('fs');
          const net = require('net');

          const envPath = process.env.GITHUB_ENV;
          if (!envPath) {
            throw new Error('GITHUB_ENV is not set');
          }

          function reserveRandomPort() {
            return new Promise((resolve, reject) => {
              const server = net.createServer();
              server.unref();
              server.on('error', reject);
              server.listen(0, '127.0.0.1', () => {
                const address = server.address();
                if (!address || typeof address === 'string') {
                  reject(new Error('Unable to resolve reserved port'));
                  return;
                }
                resolve({ server, port: address.port });
              });
            });
          }

          (async () => {
            const names = ['ANVIL_PORT', 'DEPLOYER_PORT', 'SEQUENCER_PORT', 'CENSUS_PORT'];
            const reserved = {};
            for (const name of names) {
              reserved[name] = await reserveRandomPort();
            }

            const envLines = [
              `ANVIL_PORT=${reserved.ANVIL_PORT.port}`,
              `DEPLOYER_PORT=${reserved.DEPLOYER_PORT.port}`,
              `SEQUENCER_PORT=${reserved.SEQUENCER_PORT.port}`,
              `CENSUS_PORT=${reserved.CENSUS_PORT.port}`,
              `ANVIL_RPC_URL=http://127.0.0.1:${reserved.ANVIL_PORT.port}`,
              `DEPLOYER_URL=http://127.0.0.1:${reserved.DEPLOYER_PORT.port}/addresses.env`,
              `RPC_URL=http://127.0.0.1:${reserved.ANVIL_PORT.port}`,
              `DEPLOYER_ADDRESSES_URL=http://127.0.0.1:${reserved.DEPLOYER_PORT.port}/addresses.env`,
              `SEQUENCER_INFO_URL=http://127.0.0.1:${reserved.SEQUENCER_PORT.port}/info`,
              `CENSUS_HEALTH_URL=http://127.0.0.1:${reserved.CENSUS_PORT.port}/health`,
              `SEQUENCER_API_URL=http://127.0.0.1:${reserved.SEQUENCER_PORT.port}`,
              `CENSUS_API_URL=http://127.0.0.1:${reserved.CENSUS_PORT.port}`,
            ];

            fs.appendFileSync(envPath, `${envLines.join('\n')}\n`);

            for (const key of Object.keys(reserved)) {
              reserved[key].server.close();
            }

            console.log(
              `Selected ports: anvil=${reserved.ANVIL_PORT.port} deployer=${reserved.DEPLOYER_PORT.port} sequencer=${reserved.SEQUENCER_PORT.port} census=${reserved.CENSUS_PORT.port}`
            );
          })().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run unit tests
        run: yarn test:unit

      - name: Set stack refs
        run: |
          NODE_TAG="${DAVINCI_NODE_TAG:-main}"
          NODE_REF="${DAVINCI_NODE_REF:-${NODE_TAG}}"
          RESOLVED_CONTRACTS_REF="${CONTRACTS_REF:-auto}"

          {
            echo "DAVINCI_NODE_TAG=${NODE_TAG}"
            echo "DAVINCI_NODE_REF=${NODE_REF}"
            echo "CONTRACTS_REF=${RESOLVED_CONTRACTS_REF}"
          } >> "$GITHUB_ENV"

          echo "Using stack refs: DAVINCI_NODE_TAG=${NODE_TAG} DAVINCI_NODE_REF=${NODE_REF} CONTRACTS_REF=${RESOLVED_CONTRACTS_REF}"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Start local Anvil + Sequencer stack
        run: docker compose -f test/ci/docker-compose.yml up -d --build --pull always

      - name: Wait for stack readiness
        run: bash test/ci/wait-for-stack.sh

      - name: Generate integration env file
        run: bash test/ci/write-test-env.sh

      - name: Run full election cycle integration test
        run: yarn test:integration:e2e:ci

      - name: Print stack logs on failure
        if: failure()
        run: |
          docker compose -f test/ci/docker-compose.yml ps
          docker compose -f test/ci/docker-compose.yml logs --no-color --tail=400 anvil deployer sequencer census

      - name: Stop local stack
        if: always()
        run: docker compose -f test/ci/docker-compose.yml down -v --remove-orphans
